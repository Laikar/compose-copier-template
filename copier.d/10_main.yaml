_templates_suffix: .j2
_answers_file: .copier-answers.yml
_subdirectory: src/{{ service_template }}
_skip_if_exists:
  - ".secrets/*"

compose_provider:
  type: str
  help: Container runtime to use
  choices:
    Docker: docker
    Podman root: podman
    Podman rootless: podman_rootless
  default: "podman"

service_template:
  type: str
  choices:
    - authentik
    - crafty
    - gatus
    - traefik
    - sonarr
    - radarr
    - prowlarr
    - flaresolverr
    - custom
service_name:
  type: str
  help: Name of the service. This will be used for container names, network aliases, and default hostnames.
  when: "{{ service_template == 'custom' }}"
  default: "{{ service_template }}"
config_file_name:
  type: str
  help: >-
    Name of the configuration file for this service on each other service's folder.
    EX: trafik.yml will reside on other projects to specify their traefik config.
  default: ""
  when: "{{ service_template in ['authentik','custom','traefik','gatus'] }}"
  placeholder: "No file"

log_dir:
  type: str
  help: |
    Log directory.
    This is where the service's logs will be stored.
  default: /var/log/{{ service_name }}

data_dir:
  type: str
  help: |
    Data directory.
    This is where the service's data will be stored.
  default: /var/storage/data/{{ service_name }}

media_library_dir:
  type: str
  help: |
    Library directory
    This is where your media will be stored
  default: /var/storage/library
  when: "{{ service_template in ['sonarr','radarr','jellyfin'] }}"

timezone:
  type: str
  help: |
    Timezone the container will run as
  default: Europe/Madrid
