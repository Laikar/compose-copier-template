# copier.yaml
_templates_suffix: .j2
_answers_file: .common_config.yml
_subdirectory: src
_external_data:
  secrets: secrets/template.yml

compose_provider:
  type: str
  help: Container runtime to use
  choices:
    Docker: docker
    Podman root: podman
    Podman rootless: podman_rootless
  default: "docker"

service_name:
  type: str
  help: Name of the service. This will be used for container names, network aliases, and default hostnames.

proxy_type:
  type: str
  choices:
    No proxy: "none"
    Traefik: "traefik"
  help: Select the type of reverse proxy to use for this service.

public_domain:
  type: str
  help: Public domain where the service will be accessible.
  when: "{{ proxy_type != 'none'}}"
  default: "{{ service_name }}.example.com"

internal_host:
  type: str
  help: Internal hostname or container name where the service is running.
  default: "{{ service_name }}"

internal_port:
  type: str
  help: Port on which the service is listening internally.
  default: 8080

monitoring_types:
  type: str
  help: Types of monitoring to enable for this service.
  choices:
    Gatus: gatus
  multiselect: true

gatus_monitoring_url:
  type: str
  help: URL that Gatus should use to monitor this service.
  default: "http://{{ internal_host }}:{{ internal_port }}/"
  when: "{{ 'gatus' in monitoring_types }}"

config_file_name:
  type: str
  help: >
    Name of the configuration file for this service on each other service's folder.
    EX: trafik.yml will reside on other projects to specify their traefik config.
  default: ""
  placeholder: "No file"

auth_types:
  type: str
  help: >
    How Single Sign On is handled for this service.
    Don't select any if you don't want sso
  choices:
    OAUTH/OIDC: oidc
    LDAP: ldap
    Proxy: proxy
  multiselect: true

ldap_search_domain:
  type: str
  help: LDAP search domain used for authentication.
  default: "{{ '' if 'ldap' not in auth_types else 'dc=example,dc=com'}}"
  when: "{{ 'ldap' in auth_types }}"

oidc_client_id:
  type: str
  help: OIDC client ID for the service. Defaults to a randomly generated ID if not provided.
  secret: True
  when: "{{ 'oidc' in auth_types }}"
  default: "{{ _external_data.secrets.oidc_client_id | default((99999999999999999999999999999|ans_random|hash('sha512'))[:8]) }}"

oidc_client_secret:
  type: str
  help: >
    OIDC client secret. Use a strong secret. You can generate one with:
    `tr -dc 'A-Za-z0-9' </dev/urandom | head -c 20; echo`
  secret: True
  when: "{{ 'oidc' in auth_types }}"
  default: "{{ _external_data.secrets.oidc_client_secret | default((99999999999999999999999999999|ans_random|hash('sha512'))[:16]) }}"
